[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "piaoxiaozhu-core"
version = "0.1.0"
description = "PiaoXiaoZhu core business logic package"
requires-python = ">=3.9"
dependencies = [
    "pydantic>=2.0",
    "openpyxl>=3.1",
    "httpx>=0.27",
]

[project.optional-dependencies]
ocr = [
    "paddleocr>=2.7",
    "paddlepaddle>=2.5",
]
dev = [
    "pytest>=8.0",
    "pytest-cov>=5.0",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
